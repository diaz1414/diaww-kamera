<!DOCTYPE html>
<html lang="id" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diaww Kamera — 500+ Filter Unik & Selfie Estetik Online</title>
  <meta name="description"
    content="Ambil foto selfie estetik dengan 500+ filter unik di Diaww Kamera. Gratis, cepat, dan tanpa instal. Mode cermin, hitung mundur, dan efek flash tersedia!">
  <meta name="keywords"
    content="kamera online, filter webcam, selfie estetik, webcam toy alternatif, diaww kamera, efek foto gratis">

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Diaww Kamera — 500+ Filter Unik & Selfie Estetik Online">
  <meta property="og:description"
    content="Ubah webcam jadi kamera profesional dengan 500+ filter unik. Ambil foto estetik gratis!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://camera.diaww.my.id">
  <meta property="og:image" content="logo.png">

  <!-- Tailwind CSS v4 Browser CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- INLINE TAILWIND THEME — Required for custom colors to work with CDN -->
  <style type="text/tailwindcss">
    @theme {
      --color-gold-400: #E5C158;
      --color-gold-500: #D4AF37;
      --color-gold-600: #B8962E;
      --color-magenta-500: #ff0080;
      --color-magenta-600: #e60073;
      --color-dark-950: #080808;
      --color-dark-900: #111111;
      --color-dark-800: #1a1a1a;
      --color-dark-700: #252525;
      --color-ivory-50:  #FDFCF8;
      --color-ivory-100: #F4F1E8;
      --color-ivory-200: #EAE5D5;
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans:  "Outfit", system-ui, sans-serif;
    }

    /* Section visibility system */
    section { display: none; }
    section.active { display: flex; }

    /* Scrollbar hide */
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Fade animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    /* Shutter pulse */
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.5); }
      50%       { box-shadow: 0 0 0 20px rgba(212,175,55,0); }
    }
    #capture-trigger { animation: pulse-gold 2.5s ease-in-out infinite; }
  </style>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Dependencies -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<!-- DARK MODE: dark bg + light text | LIGHT MODE: ivory bg + dark text -->

<body id="app-body" class="font-sans bg-dark-950 text-ivory-100 transition-colors duration-500">

  <!-- ============================================================ -->
  <!-- SCREEN 1: HOME                                               -->
  <!-- ============================================================ -->
  <section id="home" class="active flex-col items-center justify-center min-h-screen text-center gap-10 p-8 fade-up">
    <div class="flex flex-col items-center gap-6">
      <img src="assets/logo.png" alt="Diaww Kamera Logo"
        class="w-24 h-24 md:w-32 md:h-32 rounded-2xl shadow-2xl border border-gold-500/20">
      <h1 class="font-serif italic leading-none tracking-tight text-gold-500"
        style="font-size: clamp(4rem, 14vw, 9rem);">Diaww Kamera</h1>
      <p class="text-xs uppercase tracking-[0.5em] opacity-40">Penghormatan modern untuk estetika klasik</p>
    </div>
    <button id="start-btn"
      class="bg-gold-500 text-dark-900 font-black uppercase tracking-widest py-5 px-14 rounded-full text-base shadow-2xl hover:bg-gold-400 hover:scale-105 active:scale-95 transition-all duration-300">
      Ambil Fotomu Sekarang
    </button>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN 2: CAMERA                                             -->
  <!-- ============================================================ -->
  <section id="camera-interface" class="flex-col min-h-screen">

    <!-- Header (Clean like Webcam Toy) -->
    <header
      class="flex items-center justify-between px-6 py-3 md:px-8 md:py-5 shrink-0 bg-dark-900 border-b border-white/5">
      <div class="flex items-center gap-2 md:gap-3">
        <img src="assets/logo.png" alt="Logo" class="w-8 h-8 md:w-9 md:h-9 rounded-lg border border-gold-500/30">
        <span class="font-serif italic text-xl md:text-2xl text-white tracking-tight leading-none">Diaww Kamera <span
            class="text-gold-500 text-xs align-top">®</span></span>
      </div>
      <div class="flex items-center gap-3 md:gap-4">
        <button id="grid-toggle" title="Semua Filter"
          class="text-[0.6rem] md:text-xs font-black uppercase tracking-widest text-white/40 hover:text-gold-500 transition-colors">
          Browse Filters
        </button>
        <button id="random-filter" title="Filter Acak"
          class="w-9 h-9 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all duration-300 hover:bg-gold-500/15 hover:text-gold-500 text-white/40">
          <i data-lucide="shuffle" size="16" class="md:hidden"></i>
          <i data-lucide="shuffle" size="18" class="hidden md:block"></i>
        </button>
      </div>
    </header>

    <!-- Viewfinder Area -->
    <div class="flex-1 flex flex-col items-center justify-center px-0 py-8 md:p-6">
      <div class="relative w-full max-w-5xl flex flex-col items-center">

        <!-- Settings Panel (Mobile: Below Video | Desktop: Floating Overlay) -->
        <div id="settings-panel"
          class="hidden relative w-full mt-2 md:mt-0 md:absolute md:top-6 md:left-6 md:z-40 md:w-72 p-6 rounded-2xl bg-dark-950/90 backdrop-blur-2xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col gap-6 transition-all duration-300">
          <div class="flex items-center justify-between border-b border-white/5 pb-4">
            <h4 class="font-serif italic text-gold-500 text-xl tracking-tight">Pengaturan Pro</h4>
            <button id="close-settings" class="text-white/20 hover:text-white transition-colors">
              <i data-lucide="x" size="20"></i>
            </button>
          </div>

          <!-- Camera Device Selection -->
          <div class="flex flex-col gap-2.5">
            <label class="text-[0.65rem] font-bold uppercase tracking-[0.2em] text-white/40 mb-1">Pilih Sumber
              Kamera</label>
            <select id="camera-select"
              class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 px-4 text-xs text-white/80 focus:outline-none focus:border-gold-500/50 appearance-none cursor-pointer">
              <option value="">Default Camera</option>
            </select>
          </div>

          <!-- Modular Toggle List -->
          <div class="grid grid-cols-1 sm:grid-cols-2 md:flex md:flex-col gap-4">
            <!-- Mirror Toggle -->
            <label class="flex items-center justify-between cursor-pointer group">
              <div class="flex flex-col">
                <span class="text-sm font-bold text-white/80 group-hover:text-gold-500 transition-colors">Cermin
                  (Mirror)</span>
                <span class="text-[0.6rem] text-white/30 uppercase tracking-tighter">Flip Horizontal Tampilan</span>
              </div>
              <div class="relative inline-flex items-center">
                <input type="checkbox" id="set-mirror" class="peer hidden" checked>
                <div
                  class="w-10 h-5 bg-white/5 border border-white/10 rounded-full transition-all peer-checked:bg-gold-500 peer-checked:border-gold-500">
                </div>
                <div
                  class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-all peer-checked:translate-x-5 shadow-sm">
                </div>
              </div>
            </label>

            <!-- Countdown Toggle -->
            <label class="flex items-center justify-between cursor-pointer group">
              <div class="flex flex-col">
                <span class="text-sm font-bold text-white/80 group-hover:text-gold-500 transition-colors">Hitung Mundur
                  (3s)</span>
                <span class="text-[0.6rem] text-white/30 uppercase tracking-tighter">Timer Sebelum Menjepret</span>
              </div>
              <div class="relative inline-flex items-center">
                <input type="checkbox" id="set-countdown" class="peer hidden" checked>
                <div
                  class="w-10 h-5 bg-white/5 border border-white/10 rounded-full transition-all peer-checked:bg-gold-500 peer-checked:border-gold-500">
                </div>
                <div
                  class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-all peer-checked:translate-x-5 shadow-sm">
                </div>
              </div>
            </label>

            <!-- Flash Toggle -->
            <label class="flex items-center justify-between cursor-pointer group">
              <div class="flex flex-col">
                <span class="text-sm font-bold text-white/80 group-hover:text-gold-500 transition-colors">Efek Flash
                  Putih</span>
                <span class="text-[0.6rem] text-white/30 uppercase tracking-tighter">Flash Layar Saat Capture</span>
              </div>
              <div class="relative inline-flex items-center">
                <input type="checkbox" id="set-flash" class="peer hidden" checked>
                <div
                  class="w-10 h-5 bg-white/5 border border-white/10 rounded-full transition-all peer-checked:bg-gold-500 peer-checked:border-gold-500">
                </div>
                <div
                  class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-all peer-checked:translate-x-5 shadow-sm">
                </div>
              </div>
            </label>

            <!-- Square Aspect Toggle -->
            <label class="flex items-center justify-between cursor-pointer group">
              <div class="flex flex-col">
                <span class="text-sm font-bold text-white/80 group-hover:text-gold-500 transition-colors">Mode Kotak
                  (Square)</span>
                <span class="text-[0.6rem] text-white/30 uppercase tracking-tighter">Ganti Rasio Ke 1:1</span>
              </div>
              <div class="relative inline-flex items-center">
                <input type="checkbox" id="set-square" class="peer hidden">
                <div
                  class="w-10 h-5 bg-white/5 border border-white/10 rounded-full transition-all peer-checked:bg-gold-500 peer-checked:border-gold-500">
                </div>
                <div
                  class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-all peer-checked:translate-x-5 shadow-sm">
                </div>
              </div>
            </label>
          </div>

          <!-- Utility Actions -->
          <div class="pt-2 flex flex-col gap-2">
            <button id="toggle-fullscreen"
              class="w-full py-3 rounded-xl border border-gold-500/20 text-gold-500 text-[0.65rem] font-black uppercase tracking-[0.2em] hover:bg-gold-500 hover:text-dark-900 transition-all flex items-center justify-center gap-2">
              <i data-lucide="maximize" size="14"></i> Layar Penuh (FULLSCREEN)
            </button>
          </div>
        </div>

        <div id="camera-viewport"
          class="relative w-full rounded-2xl md:rounded-3xl overflow-hidden border-y-4 md:border-4 border-white/10 bg-dark-900 shadow-2xl transition-all duration-500"
          style="aspect-ratio: 4/3;">

          <canvas id="camera-canvas" class="w-full h-full object-cover"></canvas>

          <!-- Countdown -->
          <div id="countdown-overlay"
            class="hidden absolute inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-20">
            <span id="countdown-number" class="font-serif italic text-white"
              style="font-size:clamp(8rem,20vw,14rem);">3</span>
          </div>
        </div>
      </div>

      <!-- WEBCAM TOY CONTROLS (Adaptive: Below on Mobile, Overlay on Desktop) -->
      <div
        class="relative mt-10 md:absolute md:bottom-10 z-30 flex items-center justify-center gap-2 px-6 scale-90 md:scale-100">

        <!-- Control: Settings -->
        <button id="theme-toggle" title="Ganti Tema"
          class="w-11 h-11 md:w-12 md:h-12 rounded-lg bg-gold-500 text-white flex items-center justify-center shadow-lg hover:bg-gold-600 transition-all active:scale-90">
          <i data-lucide="settings" size="22" class="fill-white/20"></i>
        </button>

        <!-- Control: Flip Camera -->
        <button id="flip-camera" title="Ganti Kamera"
          class="w-11 h-11 md:w-12 md:h-12 rounded-lg bg-gold-500 text-white flex items-center justify-center shadow-lg hover:bg-gold-600 transition-all active:scale-90">
          <i data-lucide="refresh-ccw" size="22" class="fill-white/20"></i>
        </button>

        <!-- Control: Filter Selector -->
        <div class="flex items-center bg-gold-500 rounded-lg shadow-lg overflow-hidden h-11 md:h-12">
          <button
            class="prev-filter w-10 md:w-12 h-full flex items-center justify-center text-white hover:bg-black/10 transition-colors border-r border-white/10">
            <i data-lucide="chevron-left" size="22"></i>
          </button>
          <div class="px-4 md:px-6 flex items-center justify-center min-w-[120px] md:min-w-[160px]">
            <span id="active-filter-name"
              class="text-[0.7rem] md:text-sm font-black uppercase tracking-widest text-white whitespace-nowrap">ORIGINAL</span>
          </div>
          <button
            class="next-filter w-10 md:w-12 h-full flex items-center justify-center text-white hover:bg-black/10 transition-colors border-l border-white/10">
            <i data-lucide="chevron-right" size="22"></i>
          </button>
        </div>

        <!-- Control: Capture -->
        <button id="capture-trigger" title="Ambil Foto"
          class="w-14 h-11 md:w-16 md:h-12 rounded-lg bg-gold-500 text-white flex items-center justify-center shadow-lg hover:bg-gold-600 transition-all active:scale-95">
          <i data-lucide="camera" size="26" class="fill-white/10"></i>
        </button>

      </div>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN 3: RESULT                                             -->
  <!-- ============================================================ -->
  <section id="result-screen" class="flex-col items-center justify-center min-h-screen p-6 gap-8">
    <div class="w-full max-w-2xl flex flex-col items-center gap-8 fade-up">
      <h2 class="font-serif italic text-gold-500" style="font-size: clamp(2rem, 6vw, 3.5rem);">Hasil Tangkapanmu ✨</h2>
      <canvas id="result-canvas" class="w-full rounded-3xl shadow-2xl border-2 border-gold-500/25"></canvas>
      <div class="flex flex-wrap items-center justify-center gap-4">
        <button id="back-btn"
          class="py-3 px-8 rounded-full border-2 border-gold-500 text-gold-500 font-bold hover:bg-gold-500 hover:text-dark-900 transition-all duration-200">
          ← Ulangi
        </button>
        <button id="save-btn"
          class="py-3 px-10 rounded-full bg-gold-500 text-dark-900 font-black uppercase tracking-widest hover:bg-gold-400 hover:scale-105 active:scale-95 transition-all duration-200 shadow-xl">
          ↓ Simpan Gambar
        </button>
      </div>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- OVERLAY: FILTER EXPLORER                                     -->
  <!-- ============================================================ -->
  <div id="filter-grid-overlay"
    class="fixed inset-0 z-50 hidden flex-col overflow-hidden transition-colors duration-500"
    style="background: var(--grid-bg, rgba(8,8,8,0.97)); backdrop-filter: blur(24px);">

    <!-- Sticky header -->
    <div id="grid-header" class="shrink-0 px-6 pt-6 pb-4 flex flex-col gap-5 border-b transition-colors duration-500"
      style="border-color: var(--grid-border, rgba(255,255,255,0.07)); background: var(--grid-header-bg, rgba(8,8,8,0.9)); backdrop-filter: blur(20px);">

      <!-- Title row -->
      <div class="flex items-start justify-between">
        <div>
          <h3 class="font-serif italic text-gold-500" style="font-size: clamp(1.8rem, 5vw, 3rem);">Eksplorasi Efek</h3>
          <p id="filter-count-label" class="text-[0.6rem] uppercase tracking-[0.4em] font-bold mt-0.5"
            style="color: var(--grid-sub, rgba(255,255,255,0.3));">500+ KOLEKSI PROFESIONAL</p>
        </div>
        <button id="close-grid"
          class="w-10 h-10 flex items-center justify-center rounded-full text-gold-500 hover:rotate-90 transition-all duration-300 hover:bg-gold-500/10">
          <i data-lucide="x" size="28"></i>
        </button>
      </div>

      <!-- Search -->
      <div class="relative">
        <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gold-500/40 pointer-events-none"
          size="20"></i>
        <input type="text" id="filter-search"
          class="w-full py-3.5 pl-14 pr-5 rounded-full text-sm font-medium focus:outline-none transition-all duration-300"
          style="background: var(--grid-input-bg, rgba(255,255,255,0.06)); border: 2px solid transparent; color: var(--grid-text, #F4F1E8);"
          placeholder="Cari filter (misal: Noir, Wave, Cyber)…"
          onfocus="this.style.borderColor='#D4AF37'; this.style.background='var(--grid-input-focus, rgba(255,255,255,0.1))'"
          onblur="this.style.borderColor='transparent'; this.style.background='var(--grid-input-bg, rgba(255,255,255,0.06))'">
      </div>

      <!-- Category tabs -->
      <div class="flex items-center gap-2 flex-wrap">
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 bg-gold-500 text-dark-900 shadow-lg"
          data-cat="all">SEMUA</button>
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 hover:bg-gold-500/15 hover:text-gold-500"
          style="border:1px solid var(--grid-border-tab, rgba(255,255,255,0.12)); color: var(--grid-tab-text, rgba(255,255,255,0.55));"
          data-cat="mirror">MIRROR</button>
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 hover:bg-gold-500/15 hover:text-gold-500"
          style="border:1px solid var(--grid-border-tab, rgba(255,255,255,0.12)); color: var(--grid-tab-text, rgba(255,255,255,0.55));"
          data-cat="color">WARNA</button>
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 hover:bg-gold-500/15 hover:text-gold-500"
          style="border:1px solid var(--grid-border-tab, rgba(255,255,255,0.12)); color: var(--grid-tab-text, rgba(255,255,255,0.55));"
          data-cat="distort">WARP</button>
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 hover:bg-gold-500/15 hover:text-gold-500"
          style="border:1px solid var(--grid-border-tab, rgba(255,255,255,0.12)); color: var(--grid-tab-text, rgba(255,255,255,0.55));"
          data-cat="motion">MOTION</button>
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 hover:bg-gold-500/15 hover:text-gold-500"
          style="border:1px solid var(--grid-border-tab, rgba(255,255,255,0.12)); color: var(--grid-tab-text, rgba(255,255,255,0.55));"
          data-cat="combo">COMBO</button>
        <button
          class="cat-tab px-4 py-1.5 rounded-full text-[0.65rem] font-black uppercase tracking-widest transition-all duration-200 hover:bg-gold-500/15 hover:text-gold-500"
          style="border:1px solid var(--grid-border-tab, rgba(255,255,255,0.12)); color: var(--grid-tab-text, rgba(255,255,255,0.55));"
          data-cat="fav">⭐ FAV</button>
      </div>
    </div>

    <!-- Scrollable grid -->
    <div id="grid-items-container" class="flex-1 overflow-y-auto no-scroll grid p-5 gap-4 pb-10 content-start"
      style="grid-template-columns: repeat(auto-fill, minmax(min(160px, 45vw), 1fr));">
      <!-- Injected dynamically -->
    </div>
  </div>

  <!-- Shutter flash overlay -->
  <div id="shutter-flash" class="fixed inset-0 pointer-events-none z-[9999] opacity-0 bg-white"></div>

  <!-- Scripts -->
  <script src="js/effects.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
