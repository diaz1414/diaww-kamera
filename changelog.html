<!DOCTYPE html>
<html lang="id" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — Diaww Kamera</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style type="text/css">
    @theme {
      --color-gold-50: #fbf8ed;
      --color-gold-100: #f5eed3;
      --color-gold-200: #ecdbab;
      --color-gold-300: #dfc279;
      --color-gold-400: #d1a44e;
      --color-gold-500: #c58933;
      --color-gold-600: #a96b28;
      --color-gold-700: #885023;
      --color-gold-800: #714221;
      --color-gold-900: #60381f;
      --color-gold-950: #371d0f;
      --color-dark-900: #0f0f0f;
      --color-dark-950: #050505;
      --color-ivory-100: #f4f1e8;
      --font-serif: "Cormorant Garamond", serif;
      --font-sans: "Outfit", sans-serif;
    }

    body {
      background: #050505;
      color: #f4f1e8;
      -webkit-font-smoothing: antialiased;
    }

    .glass {
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .fade-in {
      animation: fadeIn 0.8s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="font-sans min-h-screen flex flex-col p-6 md:p-20">

  <!-- Header -->
  <header class="flex items-center justify-between mb-20 fade-in">
    <a href="/" class="flex items-center gap-3 group">
      <img src="assets/logo.png" alt="Logo"
        class="w-10 h-10 rounded-xl border border-gold-500/30 group-hover:scale-110 transition-transform">
      <span class="font-serif italic text-2xl text-gold-500">Diaww Kamera</span>
    </a>
    <a href="/" class="text-xs uppercase tracking-widest font-black text-white/50 hover:text-white transition-colors">←
      Back to App</a>
  </header>

  <main class="max-w-3xl w-full mx-auto fade-in" style="animation-delay: 0.2s;">
    <h1 class="font-serif italic text-6xl md:text-8xl text-white mb-4">Evolution</h1>
    <p class="text-gold-500/60 uppercase tracking-[0.5em] text-[0.65rem] font-bold mb-16">The Hyper-Edition Roadmap &
      History</p>

    <!-- Versions -->
    <div id="version-history" class="flex flex-col gap-12 border-l border-white/5 pl-8 md:pl-12 min-h-[200px]">
      <!-- Injected by Script -->
    </div>

    <!-- GitHub Section -->
    <div class="mt-24 p-10 rounded-3xl glass flex flex-col items-center text-center gap-10">

      <div class="flex flex-col items-center gap-3">
        <h3 class="text-2xl font-black text-white">Recent Activity</h3>
        <p class="text-xs text-gold-500/50 uppercase tracking-[0.4em]">Live from GitHub</p>
      </div>

      <!-- Activity Feed -->
      <div id="github-activity"
        class="w-full max-w-xl flex flex-col gap-6 text-left opacity-0 transition-opacity duration-1000">
        <!-- Loading State -->
        <div class="animate-pulse flex flex-col gap-4">
          <div class="h-4 bg-white/5 rounded w-3/4"></div>
          <div class="h-4 bg-white/5 rounded w-1/2"></div>
        </div>
      </div>

      <div class="flex flex-col items-center gap-6 mt-4">
        <p class="text-sm text-white/40 max-w-sm">Follow the development journey, contribute, or fork the project on
          GitHub.</p>
        <a href="https://github.com/diaz1414/diaww-kamera" target="_blank"
          class="px-10 py-4 rounded-xl bg-gold-500 text-dark-950 font-black uppercase tracking-widest text-[0.65rem] hover:bg-gold-400 hover:scale-105 transition-all transform active:scale-95 shadow-[0_10px_30px_rgba(197,137,51,0.3)]">
          View on GitHub
        </a>
      </div>
    </div>

  </main>

  <script>
    // --- 1. MANUAL VERSION HISTORY CONFIG ---
    // Tambah versi baru di sini ya! Gak perlu ngedit HTML lagi.
    const VERSION_HISTORY = [
      {
        version: "v2.2",
        date: "2026.04.03",
        title: "Diamond PRO Expansion",
        isLatest: true,
        changes: [
          "<strong>700+ Filter Library</strong> — Expanded with 200+ new Waves, Bubbles, and Cute effects.",
          "<strong>Custom Dropdown UI</strong> — Premium, theme-sync camera selector with GSAP animations.",
          "<strong>🌸 IMUT Category</strong> — Dedicated collection for Kawaii & Pastel boutique-grade filters.",
          "<strong>Reactive Hardware Sync</strong> — Fixed label latency; camera names now sync instantly.",
          "<strong>Grid Optimization</strong> — Performance boost for 16-Bits and Inception by removing heavy combos."
        ]
      },
      {
        version: "v2.1",
        date: "2026.04.03",
        title: "Media & Logic Overhaul",
        isLatest: false,
        changes: [
          "<strong>Pro Buffer Rendering</strong> — Fixed mobile distortion and split-frame bugs.",
          "<strong>Audio Feedback</strong> — Added \"Tit Tit Tit Cekrek\" sounds via Web Audio API.",
          "<strong>Premium Branding</strong> — Bespoke Diaww Kamera Logo and SEO meta tags.",
          "<strong>Inception Boost</strong> — Optimized infinite mirror effects for mobile (~64% lighter)."
        ]
      },
      {
        version: "v2.0",
        date: "2026.04.02",
        title: "The Pro Suite Release",
        isLatest: false,
        changes: [
          "Added Pro Settings Suite (Mirror, 3s Timer, White Flash, 1:1 Square Mode).",
          "Library expansion to 500+ filters using GSAP and High-FPS loop.",
          "Mobile-first control layout adaptive positioning."
        ]
      }
    ];

    function renderVersionHistory() {
      const container = document.getElementById('version-history');
      container.innerHTML = VERSION_HISTORY.map(v => `
        <div class="relative">
          <div class="absolute -left-[45px] md:-left-[61px] top-2 ${v.isLatest ? 'w-6 h-6 bg-gold-500 shadow-[0_0_20px_rgba(197,137,51,0.5)] border-4' : 'w-4 h-4 bg-white/10 border-2'} rounded-full border-dark-950"></div>
          <div class="flex flex-col gap-4">
            <div class="flex items-baseline gap-4">
              <h2 class="${v.isLatest ? 'text-3xl font-black text-white' : 'text-xl font-bold text-white/50'}">
                ${v.version} <span class="${v.isLatest ? 'text-gold-500' : 'text-white/30'} italic font-serif ${v.isLatest ? 'text-xl' : 'text-lg'} ml-2">— ${v.title}</span>
              </h2>
              <span class="text-xs text-white/30 font-mono">${v.date}</span>
            </div>
            <ul class="flex flex-col gap-3 ${v.isLatest ? 'text-white/70 text-sm' : 'text-white/40 text-xs'} ${v.isLatest ? 'leading-relaxed' : ''}">
              ${v.changes.map(c => `
                <li class="flex gap-3">
                  ${v.isLatest ? '<span class="text-gold-500">▶</span>' : '•'}
                  <p>${c}</p>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>
      `).join('');
    }

    // --- 2. GITHUB AUTO-FEED ---
    async function fetchCommits() {
      const container = document.getElementById('github-activity');
      try {
        const response = await fetch('https://api.github.com/repos/diaz1414/diaww-kamera/commits?per_page=5');
        if (!response.ok) throw new Error('Failed to fetch');
        const commits = await response.json();
        
        container.innerHTML = '';
        commits.forEach((item) => {
          const date = new Date(item.commit.author.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
          const message = item.commit.message.split('\n')[0];
          
          const el = document.createElement('div');
          el.className = 'flex items-start gap-4 group cursor-pointer';
          el.innerHTML = `
            <div class="shrink-0 w-8 h-8 rounded-lg bg-white/5 border border-white/5 flex items-center justify-center text-[0.6rem] font-bold text-gold-500 group-hover:bg-gold-500 group-hover:text-white transition-all">
              ${date}
            </div>
            <div class="flex flex-col gap-1 border-b border-white/5 pb-4 w-full">
              <p class="text-sm text-white/80 group-hover:text-white transition-colors line-clamp-1">${message}</p>
              <p class="text-[0.6rem] uppercase tracking-widest text-white/20 font-mono">SHA: ${item.sha.substring(0, 7)}</p>
            </div>
          `;
          el.onclick = () => window.open(item.html_url, '_blank');
          container.appendChild(el);
        });
        
        container.classList.remove('opacity-0');
        container.classList.add('opacity-100');
      } catch (err) {
        container.innerHTML = '<p class="text-center text-xs text-white/20 italic">Gagal memuat aktivitas GitHub (Limit API tercapai atau repo private).</p>';
        container.classList.add('opacity-100');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderVersionHistory();
      fetchCommits();
    });
  </script>

  <footer class="mt-auto pt-20 text-center text-[0.6rem] uppercase tracking-[0.6em] text-white/20">
    &copy; 2026 Diaww Kamera. Built with Passion.
  </footer>

</body>

</html>
